name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build, Sign & Release
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Cache Homebrew
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-xcodegen-${{ runner.os }}

      - name: Install xcodegen and sentry-cli
        run: brew install xcodegen getsentry/tools/sentry-cli

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Generate ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          PLIST

      - name: Archive
        run: |
          xcodebuild archive \
            -project Sela.xcodeproj \
            -scheme Sela \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/Sela.xcarchive \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: de-nieuwe-psalmberijming
          SENTRY_PROJECT: sela
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set — skipping dSYM upload"
            exit 0
          fi
          sentry-cli debug-files upload \
            --include-sources \
            build/Sela.xcarchive

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Sela.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Create ZIP
        run: |
          cd build/export
          ditto -c -k --keepParent Sela.app \
            "Sela-${{ steps.version.outputs.version }}-arm64.zip"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit \
            "build/export/Sela-${{ steps.version.outputs.version }}-arm64.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple and re-zip
        run: |
          xcrun stapler staple "build/export/Sela.app"
          cd build/export
          rm "Sela-${{ steps.version.outputs.version }}-arm64.zip"
          ditto -c -k --keepParent Sela.app \
            "Sela-${{ steps.version.outputs.version }}-arm64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sela ${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            build/export/Sela-${{ steps.version.outputs.version }}-arm64.zip

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(shasum -a 256 "build/export/Sela-${VERSION}-arm64.zip" | cut -d' ' -f1)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Joehoel/homebrew-sela.git" /tmp/homebrew-sela
          cd /tmp/homebrew-sela

          cat > Casks/sela.rb <<CASK
          cask "sela" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/Joehoel/sela/releases/download/v#{version}/Sela-#{version}-arm64.zip"
            name "Sela"
            desc "Translate ProPresenter worship songs from English to Dutch"
            homepage "https://github.com/Joehoel/sela"

            depends_on macos: ">= :sonoma"
            depends_on arch: :arm64

            app "Sela.app"
          end
          CASK

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/sela.rb
          git commit -m "Update Sela to ${VERSION}"
          git push
