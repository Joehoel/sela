name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Cache Homebrew
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-swiftlint-${{ runner.os }}

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-and-test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Cache Homebrew
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-xcodegen-${{ runner.os }}

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Cache DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test
        run: |
          xcodebuild -project Sela.xcodeproj \
            -scheme Sela \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skip-testing SelaTests/TranslationEvalTests \
            test

  cleanup-caches:
    name: Cleanup old caches
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build-and-test]
    permissions:
      actions: write
    steps:
      - name: Delete old DerivedData caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh cache list -R $REPO --key deriveddata- --sort created_at --order asc --json id \
            | jq '.[:-1] | .[].id' \
            | xargs -I {} gh cache delete {} -R $REPO
