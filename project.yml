name: Sela
options:
  bundleIdPrefix: com.sela
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: "1.28.0"

targets:
  Sela:
    type: application
    platform: macOS
    sources:
      - Sela
    dependencies:
      - package: SwiftProtobuf
    info:
      path: Sela/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleURLTypes:
          - CFBundleURLName: com.sela.app
            CFBundleURLSchemes:
              - sela
        NSAppleScriptEnabled: true
        OSAScriptingDefinition: Sela.sdef
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sela.app
        PRODUCT_NAME: Sela
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  SelaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SelaTests
    dependencies:
      - target: Sela
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Sela.app/Contents/MacOS/Sela"
