excluded:
  - DerivedData
  - .build
  - Sela/ProPresenter/Proto

line_length:
  warning: 140
  error: 200
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100


identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - i
    - j

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_string
  - first_where
  - modifier_order
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  - todo
  - nesting
  - trailing_comma
  - opening_brace
  - comma
  - modifier_order
